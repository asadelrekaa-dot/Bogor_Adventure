<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisi - Bogor Adventure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .page-wrap { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .page-wrap .back-link { text-decoration: none; color: #fff; font-size: clamp(11px, 3vw, 13px); font-weight: bold; background: #8c5d52; padding: 8px 16px; border-radius: 20px; align-self: flex-start; }
        .page-wrap h2 { font-size: clamp(17px, 5.5vw, 22px); font-style: italic; color: #fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.2); margin: 0; word-break: break-word; }
        .member-list { display: flex; flex-direction: column; gap: 10px; }
        .member-card { background: #fbeee6; border-radius: 14px; padding: 12px 14px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border: 2px solid #bd9687; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .member-card .name { font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; color: #5a4b41; word-break: break-word; }
        .member-card .badge { background: #8c5d52; color: #fff; font-size: clamp(8px, 2.5vw, 10px); padding: 3px 10px; border-radius: 10px; flex-shrink: 0; }
        .empty-state { text-align: center; color: #fff; font-style: italic; font-size: clamp(11px, 3vw, 13px); opacity: 0.8; padding: 30px; }
        .sub-group { margin-top: 10px; }
        .sub-group .sub-title { font-size: clamp(10px, 3vw, 12px); font-weight: bold; color: #8c5d52; margin-bottom: 6px; padding-left: 4px; }
        .sub-group .member-card { border-color: #d4b5a5; }
        .catatan-card { background: #fff3e6; border-radius: 14px; padding: 14px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border: 2px dashed #d4a373; margin-top: 16px; }
        .catatan-card .catatan-title { font-size: clamp(12px, 3.5vw, 14px); font-weight: bold; color: #8c5d52; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .catatan-card ul { margin: 0; padding-left: 20px; font-size: clamp(11px, 3vw, 13px); color: #5a4b41; }
        .catatan-card ul li { margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="app-container page-wrap">
        <a href="index.html" class="back-link">← KEMBALI</a>
        <h2 id="pageTitle">Divisi</h2>
        <div id="memberList" class="member-list"></div>
    </div>
    <script src="script.js"></script>
    <script>
        const type = new URLSearchParams(window.location.search).get('type') || 'konsumsi-pagi';
        const container = document.getElementById('memberList');
        const title = document.getElementById('pageTitle');

        const config = {
            'konsumsi-pagi': {
                label: 'PIKET KONSUMSI PAGI',
                sub: [
                    { label: 'Pagi Hari 1', filter: m => m.piket === 'Pagi Hari 1' },
                    { label: 'Pagi Hari 2', filter: m => m.piket === 'Pagi Hari 2' },
                    { label: 'Pagi Hari 3', filter: m => m.piket === 'Pagi Hari 3' },
                ]
            },
            'konsumsi-siang': {
                label: 'PIKET KONSUMSI SIANG',
                sub: [
                    { label: 'Siang Hari 2 (Villa)', filter: m => m.piket === 'Siang Hari 2' },
                    { label: 'Siang Hari 2 (Kawah Ratu)', filter: m => m.piket.includes('Kawah Ratu') },
                    { label: 'Siang Hari 3', filter: m => m.piket === 'Siang Hari 3' },
                ]
            },
            'konsumsi-malam': {
                label: 'PIKET KONSUMSI MALAM',
                sub: [
                    { label: 'Malam Hari 1', filter: m => m.piket === 'Malam Hari 1' },
                    { label: 'Malam Hari 2', filter: m => m.piket === 'Malam Hari 2' },
                ]
            },
            'frozen-food': {
                label: 'TIM BAKAR FROZEN FOOD',
                filter: m => m.divisi === 'Bakar Frozen Food'
            },
            'panitia-inti': {
                label: 'PANITIA INTI',
                filter: m => ['Ketua Acara', 'Wakil Acara', 'Sekertaris', 'Bendahara', 'Kendaraan'].some(r => m.divisi.includes(r))
            },
            'divisi-lain': {
                label: 'DIVISI LAPANGAN',
                sub: [
                    { label: 'Kebersihan', filter: m => m.divisi === 'Kebersihan' },
                    { label: 'Kesehatan', filter: m => m.divisi === 'Kesehatan' },
                    { label: 'Timekeeper', filter: m => m.divisi === 'Timekeeper' },
                    { label: 'MC', filter: m => m.divisi === 'MC' },
                    { label: 'Tenda', filter: m => m.divisi === 'Tenda' },
                    { label: 'Acara', filter: m => m.divisi === 'Acara' },
                ]
            }
        };

        const cfg = config[type];
        if (!cfg) { container.innerHTML = '<div class="empty-state">Halaman tidak ditemukan</div>'; }

        title.textContent = cfg.label;
        let html = '';

        if (cfg.sub) {
            cfg.sub.forEach(s => {
                const members = memberDatabase.filter(s.filter);
                if (members.length === 0) return;
                html += `<div class="sub-group"><div class="sub-title">${s.label}</div>`;
                members.forEach(m => {
                    html += `<div class="member-card"><span class="name">${m.name}</span><span class="badge">${m.divisi}</span></div>`;
                });
                html += `</div>`;
            });
        } else {
            const members = memberDatabase.filter(cfg.filter);
            if (members.length === 0) {
                html = '<div class="empty-state">Tidak ada anggota</div>';
            } else {
                members.forEach(m => {
                    html += `<div class="member-card"><span class="name">${m.name}</span><span class="badge">${m.divisi}</span></div>`;
                });
            }
        }

        if (html === '') html = '<div class="empty-state">Tidak ada anggota</div>';
        container.innerHTML = html;

        const catatan = {
            'konsumsi-pagi': ['Nasi, Lauk, Air Putih', 'Khusus malam pertama, makan malam pop mie dan bakar-bakar'],
            'konsumsi-siang': ['Nasi, Lauk, Air Putih', 'Khusus malam pertama, makan malam pop mie dan bakar-bakar'],
            'konsumsi-malam': ['Nasi, Lauk, Air Putih', 'Khusus malam pertama, makan malam pop mie dan bakar-bakar'],
            'frozen-food': ['Arang, Frozen food (bebas asal sesuai budget)', 'Bakar-bakar: Rp 20.000 × 47 orang = Rp 940.000'],
            'panitia-inti': ['Kendaraan: Siapkan motor juga untuk konsumsi']
        };

        if (catatan[type]) {
            let noteHtml = '<div class="catatan-card"><div class="catatan-title"><i class="fas fa-clipboard-list"></i> Catatan</div><ul>';
            catatan[type].forEach(s => { noteHtml += '<li>' + s + '</li>'; });
            noteHtml += '</ul></div>';
            container.innerHTML += noteHtml;
        }

        if (type === 'divisi-lain') {
            let noteHtml = '<div class="catatan-card"><div class="catatan-title"><i class="fas fa-clipboard-list"></i> Catatan</div><ul>';
            noteHtml += '<li>Kebersihan: Plastik sampah</li>';
            noteHtml += '<li>Kesehatan: Obat: Antimo, paracetamol, minyak kayu putih / freshcare, plastik muntah</li>';
            noteHtml += '<li>Tenda: Persiapkan tenda sebelum berangkat. Malam ke 2 pasang tenda</li>';
            noteHtml += '</ul></div>';
            container.innerHTML += noteHtml;
        }
    </script>
</body>
</html>
